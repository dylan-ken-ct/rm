<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Assessment Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(780px, 100%);
      background: #fff;
      border: 1px solid #e0ded8;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
      padding: 32px;
    }
    .eyebrow {
      color: #e87722;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      margin: 0 0 8px;
      color: #1a1a1a;
    }
    .intro {
      font-size: 15px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 24px;
    }
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .choice-card {
      position: relative;
      border: 1px solid #e0ded8;
      border-radius: 12px;
      padding: 20px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .choice-card:hover {
      transform: translateY(-2px);
      border-color: #e87722;
      box-shadow: 0 8px 20px rgba(232, 119, 34, 0.12);
    }
    .choice-card.selected {
      border-color: #e87722;
      background: #fff8f2;
      box-shadow: 0 10px 24px rgba(232, 119, 34, 0.1);
    }
    .choice-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .choice-card .icon {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .choice-card h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 17px;
      margin: 0 0 8px;
      color: #1a1a1a;
    }
    .choice-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      color: #666;
    }
    .actions {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }
    button {
      border: none;
      border-radius: 8px;
      background: #e87722;
      color: #fff;
      padding: 12px 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:hover { opacity: 0.9; }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      display: none;
      color: #c0392b;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
    }
    @media (max-width: 640px) {
      .card { padding: 24px; }
      .choice-grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">B2B Assessment Portal</p>
    <h1>Select the survey you want to start</h1>
    <p class="intro">Choose the assessment that best matches your role to continue to the correct survey.</p>

    <div class="choice-grid">
      <label class="choice-card" data-value="leadership">
        <input type="radio" name="assessment-type" value="leadership">
        <h2>B2B Leadership Assessment</h2>
        <p>For team leaders, Supervisors, and managers reviewing coaching, compliance, and team performance.</p>
      </label>

      <label class="choice-card" data-value="agent">
        <input type="radio" name="assessment-type" value="agent">
        <h2>B2B Agent Assessment</h2>
        <p>For customer-facing agents reviewing scripting, daily processes, and product confidence.</p>
      </label>
    </div>

    <div class="actions">
      <button id="continue-btn" type="button" disabled>Continue</button>
    </div>
    <p class="error" id="selection-error">Please select one assessment to continue.</p>
  </div>

  <script>
    const cards = document.querySelectorAll('.choice-card');
    const continueBtn = document.getElementById('continue-btn');
    const error = document.getElementById('selection-error');

    cards.forEach((card) => {
      card.addEventListener('click', () => {
        cards.forEach((item) => item.classList.remove('selected'));
        card.classList.add('selected');
        const input = card.querySelector('input');
        input.checked = true;
        continueBtn.disabled = false;
        error.style.display = 'none';
      });
    });

    continueBtn.addEventListener('click', () => {
      const selected = document.querySelector('input[name="assessment-type"]:checked');
      if (!selected) {
        error.style.display = 'block';
        return;
      }

      if (selected.value === 'leadership') {
        window.location.href = 'leadership-assessment.html';
      } else {
        window.location.href = 'B2B Agent assessment.html';
      }
    });
  </script>
</body>
</html>
